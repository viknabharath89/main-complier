<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Compiler</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1e1e;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* top bar */

.topbar{
display:flex;
align-items:center;
padding:10px;
background:#252526;
gap:10px;
}

#language{
padding:6px;
background:#1e1e1e;
color:white;
border:1px solid #444;
}

#filename{
color:#9cdcfe;
font-size:14px;
}

#runBtn{
padding:6px 14px;
background:#0e639c;
border:none;
color:white;
cursor:pointer;
}

#runBtn:hover{
background:#1177bb;
}

/* editor */

#editor{
flex:1;
}

/* bottom panel */

.bottom{
display:flex;
height:180px;
border-top:1px solid #333;
}

.panel{
flex:1;
display:flex;
flex-direction:column;
}

.panel-title{
background:#252526;
padding:6px 10px;
font-size:13px;
}

textarea{
flex:1;
background:#1e1e1e;
color:white;
border:none;
outline:none;
padding:8px;
font-family:monospace;
resize:none;
}

#output{
flex:1;
background:#111;
color:#00ff9c;
padding:10px;
overflow:auto;
font-family:monospace;
}

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="topbar">

<select id="language"></select>

<div id="filename"></div>

<button id="runBtn">Run ▶</button>

</div>


<!-- EDITOR -->

<div id="editor"></div>


<!-- INPUT OUTPUT -->

<div class="bottom">

<div class="panel">
<div class="panel-title">Input</div>
<textarea id="input" placeholder="Program input..."></textarea>
</div>

<div class="panel">
<div class="panel-title">Output</div>
<pre id="output"></pre>
</div>

</div>


<!-- MONACO LOADER -->

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

<!-- YOUR SCRIPT -->

<script src="script.js"></script>

</body>
</html>
